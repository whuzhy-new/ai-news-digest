name: Fetch AI News

on:
  schedule:
    - cron: "17 1,7,13,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Run main.py
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python main.py

      - name: Commit & push results
        run: |
          git config user.name "whuzhy-new"
          git config user.email "whuzhy-new@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "data: fetch $(date -u +%Y-%m-%d\ %H:%M)"
          git push
